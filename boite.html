<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Envoyer</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(255, 107, 107, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.08) 0%, transparent 50%);
        }

        .container {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px 35px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back {
            color: #666;
            font-size: 14px;
            display: block;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-weight: 500;
        }
        .back:hover { color: #fff; }

        .logo .emoji-big {
            font-size: 52px;
            display: block;
            margin-bottom: 5px;
        }
        .logo h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 5px 0 4px;
        }
        .logo h2 span {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #777;
            font-size: 15px;
        }

        .pseudo-display {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 30px;
            padding: 16px 20px;
            margin: 25px 0 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .pseudo-display span {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        textarea {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 18px 20px;
            color: #eee;
            font-size: 16px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: 0.3s;
            line-height: 1.6;
        }
        textarea:focus {
            border-color: #ff6b6b;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 30px -10px rgba(255, 107, 107, 0.1);
        }
        textarea::placeholder {
            color: #444;
        }

        .btn-send {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 18px;
            transition: 0.3s;
            box-shadow: 0 10px 30px -5px rgba(238, 90, 36, 0.3);
        }
        .btn-send:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px -5px rgba(238, 90, 36, 0.4);
        }
        .btn-send:active {
            transform: scale(0.97);
        }
        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            color: #555;
            font-size: 14px;
            margin-top: 18px;
            min-height: 22px;
        }
        #status.success { color: #4ade80; }
        #status.error { color: #ff6b6b; }

        .footer {
            color: #222;
            font-size: 12px;
            margin-top: 25px;
            letter-spacing: 0.3px;
        }
        .footer span {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" onclick="history.back()">← Retour</a>
        
        <div class="logo">
            <span class="emoji-big">✉️</span>
            <h2>Message <span>anonyme</span></h2>
            <p>Pose ta question en toute liberté</p>
        </div>

        <div class="pseudo-display">
            @<span id="pseudoDisplay">pseudo</span>
        </div>

        <textarea id="messageInput" placeholder="Écris ton message ici..."></textarea>

        <button class="btn-send" onclick="envoyerMessage()">📨 Envoyer anonymement</button>

        <div id="status"></div>
        <div class="footer">🔒 100% anonyme • <span>♥</span> 2026</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const pseudo = params.get('pseudo');

        if (pseudo) {
            document.getElementById('pseudoDisplay').textContent = pseudo;
        } else {
            document.getElementById('status').textContent = '❌ Lien invalide';
            document.getElementById('status').className = 'error';
        }

        function envoyerMessage() {
            const contenu = document.getElementById('messageInput').value.trim();
            const statusEl = document.getElementById('status');

            if (!contenu) {
                alert('📝 Écris un message !');
                return;
            }
            if (contenu.length < 2) {
                alert('📝 Message trop court (min. 2 caractères)');
                return;
            }
            if (!pseudo) {
                alert('❌ Erreur : pseudo manquant');
                return;
            }

            statusEl.textContent = '⏳ Envoi en cours...';
            statusEl.className = '';
            document.querySelector('.btn-send').disabled = true;

            const messagesRef = database.ref('boites/' + pseudo + '/messages');
            const newMessageRef = messagesRef.push();

            newMessageRef.set({
                contenu: contenu,
                date: Date.now()
            }).then(() => {
                database.ref('boites/' + pseudo + '/nbMessages').transaction((current) => {
                    return (current || 0) + 1;
                });
                statusEl.textContent = '✅ Message envoyé avec succès !';
                statusEl.className = 'success';
                document.getElementById('messageInput').value = '';
                document.querySelector('.btn-send').disabled = false;
                setTimeout(() => {
                    statusEl.textContent = '';
                    statusEl.className = '';
                }, 3000);
            }).catch((error) => {
                statusEl.textContent = '❌ ' + error.message;
                statusEl.className = 'error';
                document.querySelector('.btn-send').disabled = false;
            });
        }
    </script>
</body>
</html>
