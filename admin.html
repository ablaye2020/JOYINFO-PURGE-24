<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY PURGE GAME - ADMIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        h1, h2 { color: #FFD700; font-family: 'Cinzel', serif; margin-bottom: 20px; }
        .card {
            background: #1a1a1a;
            border: 1px solid #8B0000;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        input, select, textarea {
            background: #0a0a0a;
            border: 1px solid #FFD700;
            padding: 10px;
            border-radius: 10px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        button {
            background: linear-gradient(135deg, #8B0000, #cc0000);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #FFD700;
            cursor: pointer;
            margin: 5px;
        }
        .btn-danger { background: #c0392b; }
        .btn-success { background: #27ae60; }
        .clan-item, .question-item {
            background: #0a0a0a;
            border-left: 4px solid #FFD700;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .pin { font-size: 2em; text-align: center; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="login" class="login-box card">
    <h1>👑 ADMIN</h1>
    <input type="password" id="pin" class="pin" maxlength="4" placeholder="CODE">
    <button onclick="checkPin()">🔐 ENTRER</button>
    <div id="loginError" style="color: red; margin-top: 10px;"></div>
    <a href="index.html" style="color:#FFD700;">← Retour</a>
</div>

<div id="adminPanel" style="display: none;">
    <div class="card">
        <h1>⚜️ PANEL ADMIN JOY PURGE GAME ⚜️</h1>
        <button onclick="logout()">🚪 DÉCONNEXION</button>
        <button onclick="location.reload()">🔄 RAFRAÎCHIR</button>
    </div>
    
    <!-- GESTION DES CLANS -->
    <div class="card">
        <h2>🏆 GESTION DES CLANS</h2>
        <input type="text" id="clanName" placeholder="Nom du clan">
        <input type="text" id="clanLeader" placeholder="Chef du clan">
        <button onclick="addClan()" class="btn-success">➕ AJOUTER LE CLAN</button>
        <div id="clansList"></div>
    </div>
    
    <!-- RÉINITIALISATION SCORES -->
    <div class="card">
        <h2>🔄 RÉINITIALISATION</h2>
        <button onclick="resetScores('week')">📅 RESET SEMAINE</button>
        <button onclick="resetScores('month')">📆 RESET MOIS</button>
        <button onclick="resetScores('year')">🗓️ RESET ANNÉE</button>
        <button onclick="resetAllScores()" class="btn-danger">⚠️ RESET TOUS LES SCORES</button>
        <button onclick="deleteAllClans()" class="btn-danger">🗑️ SUPPRIMER TOUS LES CLANS</button>
    </div>
    
    <!-- QUESTIONS PARTIE 1 (TEXTE) -->
    <div class="card">
        <h2>📝 QUESTIONS PARTIE 1 (TEXTE)</h2>
        <input type="text" id="q1Text" placeholder="Question">
        <input type="text" id="q1A" placeholder="Réponse A">
        <input type="text" id="q1B" placeholder="Réponse B">
        <input type="text" id="q1C" placeholder="Réponse C">
        <input type="text" id="q1D" placeholder="Réponse D">
        <select id="q1Correct">
            <option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option>
        </select>
        <button onclick="addQuestion('partie1')" class="btn-success">➕ AJOUTER QUESTION TEXTE</button>
        <div id="questions1List"></div>
    </div>
    
    <!-- QUESTIONS PARTIE 2 (IMAGES) -->
    <div class="card">
        <h2>🖼️ QUESTIONS PARTIE 2 (IMAGES)</h2>
        <input type="text" id="q2Text" placeholder="Question (ex: Qui est ce purgeur ?)">
        <input type="file" id="q2Image" accept="image/*">
        <input type="text" id="q2A" placeholder="Réponse A">
        <input type="text" id="q2B" placeholder="Réponse B">
        <input type="text" id="q2C" placeholder="Réponse C">
        <input type="text" id="q2D" placeholder="Réponse D">
        <select id="q2Correct">
            <option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option>
        </select>
        <button onclick="addQuestion('partie2')" class="btn-success">➕ AJOUTER QUESTION IMAGE</button>
        <div id="questions2List"></div>
    </div>
    
    <!-- NETTOYAGE TOTAL -->
    <div class="card">
        <h2>⚠️ ZONE DANGEREUSE</h2>
        <button onclick="deleteAllData()" class="btn-danger">🗑️ SUPPRIMER TOUTES LES DONNÉES (clans + questions + forum + salons)</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3yYAuiGqbtrbZ1aSYxAjduZ65adNIpag",
        authDomain: "purge-game-58718.firebaseapp.com",
        databaseURL: "https://purge-game-58718-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "purge-game-58718",
        storageBucket: "purge-game-58718.firebasestorage.app",
        messagingSenderId: "554574972856",
        appId: "1:554574972856:web:9de17e7f77eb7b5be4b14d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    
    const ADMIN_PIN = "2007";
    
    function checkPin() {
        if(document.getElementById('pin').value === ADMIN_PIN) {
            localStorage.setItem('adminLogged', 'true');
            document.getElementById('login').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAll();
        } else {
            document.getElementById('loginError').innerText = '❌ Code incorrect';
        }
    }
    
    if(localStorage.getItem('adminLogged') === 'true') {
        document.getElementById('login').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadAll();
    }
    
    function logout() { localStorage.removeItem('adminLogged'); location.reload(); }
    function toast(msg) { alert(msg); }
    
    async function loadAll() {
        await loadClans();
        await loadQuestions('partie1', 'questions1List');
        await loadQuestions('partie2', 'questions2List');
    }
    
    async function loadClans() {
        const snapshot = await db.ref('clans').once('value');
        const clans = [];
        snapshot.forEach(child => clans.push({ id: child.key, ...child.val() }));
        const container = document.getElementById('clansList');
        if(clans.length === 0) { container.innerHTML = '<p>Aucun clan</p>'; return; }
        container.innerHTML = clans.map(c => `
            <div class="clan-item">
                <strong>⚔️ ${escapeHtml(c.name)}</strong> - 👑 ${escapeHtml(c.leader)}
                <br>📅 Sem:${c.score_week||0} 📆 Mois:${c.score_month||0} 🗓️ Année:${c.score_year||0}
                <button onclick="deleteClan('${c.id}')" class="btn-danger">🗑️</button>
            </div>
        `).join('');
    }
    
    async function addClan() {
        const name = document.getElementById('clanName').value.trim();
        const leader = document.getElementById('clanLeader').value.trim();
        if(!name || !leader) { toast("❌ Remplissez tous les champs"); return; }
        await db.ref('clans').push({ name, leader, score_week:0, score_month:0, score_year:0, likes:0 });
        toast("✅ Clan ajouté !");
        document.getElementById('clanName').value = '';
        document.getElementById('clanLeader').value = '';
        loadClans();
    }
    
    window.deleteClan = async (id) => { if(confirm("Supprimer ?")) { await db.ref(`clans/${id}`).remove(); loadClans(); } };
    
    async function resetScores(period) {
        const snapshot = await db.ref('clans').once('value');
        const updates = {};
        snapshot.forEach(child => { updates[`${child.key}/score_${period}`] = 0; });
        await db.ref('clans').update(updates);
        toast(`✅ Scores ${period} reset`);
        loadClans();
    }
    
    async function resetAllScores() {
        if(confirm("⚠️ RESET TOUS LES SCORES ?")) {
            const snapshot = await db.ref('clans').once('value');
            const updates = {};
            snapshot.forEach(child => {
                updates[`${child.key}/score_week`] = 0;
                updates[`${child.key}/score_month`] = 0;
                updates[`${child.key}/score_year`] = 0;
            });
            await db.ref('clans').update(updates);
            toast("✅ Tous les scores sont à 0");
            loadClans();
        }
    }
    
    async function deleteAllClans() {
        if(confirm("⚠️ SUPPRIMER TOUS LES CLANS ?")) {
            const snapshot = await db.ref('clans').once('value');
            for(let child of snapshot.val()) { await db.ref(`clans/${child.key}`).remove(); }
            toast("✅ Tous les clans supprimés");
            loadClans();
        }
    }
    
    async function addQuestion(mode) {
        const text = document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}Text`).value.trim();
        const answers = [
            document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}A`).value.trim(),
            document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}B`).value.trim(),
            document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}C`).value.trim(),
            document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}D`).value.trim()
        ];
        const correct = parseInt(document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}Correct`).value);
        
        if(!text || answers.some(a => !a)) { toast("❌ Remplissez tous les champs"); return; }
        
        let imageUrl = null;
        if(mode === 'partie2') {
            const file = document.getElementById('q2Image').files[0];
            if(file) {
                const ref = storage.ref(`questions/${Date.now()}_${file.name}`);
                await ref.put(file);
                imageUrl = await ref.getDownloadURL();
            }
        }
        
        const data = { text, answers, correct, createdAt: Date.now() };
        if(imageUrl) data.image = imageUrl;
        
        await db.ref(`questions/${mode}`).push(data);
        toast("✅ Question ajoutée !");
        
        document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}Text`).value = '';
        document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}A`).value = '';
        document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}B`).value = '';
        document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}C`).value = '';
        document.getElementById(`${mode === 'partie1' ? 'q1' : 'q2'}D`).value = '';
        if(mode === 'partie2') document.getElementById('q2Image').value = '';
        
        loadQuestions(mode, mode === 'partie1' ? 'questions1List' : 'questions2List');
    }
    
    async function loadQuestions(mode, containerId) {
        const snapshot = await db.ref(`questions/${mode}`).once('value');
        const questions = [];
        snapshot.forEach(child => questions.push({ id: child.key, ...child.val() }));
        const container = document.getElementById(containerId);
        if(questions.length === 0) { container.innerHTML = '<p>Aucune question</p>'; return; }
        container.innerHTML = questions.map((q, i) => `
            <div class="question-item">
                <strong>❓ ${i+1}. ${escapeHtml(q.text)}</strong><br>
                A. ${escapeHtml(q.answers[0])}<br>
                B. ${escapeHtml(q.answers[1])}<br>
                C. ${escapeHtml(q.answers[2])}<br>
                D. ${escapeHtml(q.answers[3])}<br>
                ✅ Bonne réponse: ${String.fromCharCode(65+q.correct)}
                <button onclick="deleteQuestion('${mode}', '${q.id}')" class="btn-danger">🗑️</button>
            </div>
        `).join('');
    }
    
    window.deleteQuestion = async (mode, id) => {
        if(confirm("Supprimer cette question ?")) {
            await db.ref(`questions/${mode}/${id}`).remove();
            loadQuestions(mode, mode === 'partie1' ? 'questions1List' : 'questions2List');
        }
    };
    
    async function deleteAllData() {
        if(confirm("⚠️ SUPPRIMER TOUTES LES DONNÉES (clans, questions, forum, salons) ? IRRÉVERSIBLE !")) {
            // Supprimer clans
            const clansSnap = await db.ref('clans').once('value');
            for(let c of clansSnap.val()) { await db.ref(`clans/${c.key}`).remove(); }
            // Supprimer questions
            const q1Snap = await db.ref('questions/partie1').once('value');
            if(q1Snap.val()) for(let q of q1Snap.val()) { await db.ref(`questions/partie1/${q.key}`).remove(); }
            const q2Snap = await db.ref('questions/partie2').once('value');
            if(q2Snap.val()) for(let q of q2Snap.val()) { await db.ref(`questions/partie2/${q.key}`).remove(); }
            // Supprimer forum
            const forumSnap = await db.ref('forum').once('value');
            if(forumSnap.val()) for(let m of forumSnap.val()) { await db.ref(`forum/${m.key}`).remove(); }
            // Supprimer salons
            const roomsSnap = await db.ref('game_rooms').once('value');
            if(roomsSnap.val()) for(let r of roomsSnap.val()) { await db.ref(`game_rooms/${r.key}`).remove(); }
            
            toast("✅ TOUTES LES DONNÉES ONT ÉTÉ SUPPRIMÉES !");
            loadAll();
        }
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
</script>
</body>
</html>
