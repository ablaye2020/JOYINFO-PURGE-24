<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Anonyme</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        /* Effet de fond animé */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 107, 107, 0.15), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(238, 90, 36, 0.1), transparent 50%);
            animation: rotateBg 20s linear infinite;
            z-index: 0;
        }
        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 45px 30px 35px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        .logo .icon {
            font-size: 60px;
            display: block;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .logo h1 {
            color: #fff;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1.5px;
        }
        .logo h1 .gradient {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: rgba(255, 107, 107, 0.2);
        }
        .card .emoji-big {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }
        .card h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .card p {
            color: #777;
            font-size: 14px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 8px 0;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn:hover::after {
            opacity: 1;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            box-shadow: 0 10px 30px rgba(238, 90, 36, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 15px 40px rgba(238, 90, 36, 0.35);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        #status {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin-top: 18px;
            letter-spacing: 0.3px;
        }
        #status.loaded {
            color: #4ade80;
        }
        .footer {
            text-align: center;
            color: #333;
            font-size: 12px;
            margin-top: 22px;
            letter-spacing: 0.5px;
        }
        .footer span {
            color: #ff6b6b;
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="icon">💬</span>
            <h1>Ask<span class="gradient">Me</span></h1>
            <p>Pose des questions en toute anonymat</p>
        </div>

        <div class="card">
            <span class="emoji-big">🚀</span>
            <h2>Crée ta boîte</h2>
            <p>Reçois des messages anonymes de tes amis</p>
        </div>

        <button class="btn btn-primary" onclick="creerBoite()">✨ Commencer maintenant</button>
        <button class="btn btn-secondary" onclick="voirBoite()">📥 Voir mes messages</button>

        <div id="status">⏳ Connexion...</div>
        <div class="footer">🔒 100% anonyme • <span>♥</span> 2026</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = null;

        firebase.auth().signInAnonymously()
            .then((userCredential) => {
                currentUser = userCredential.user;
                const el = document.getElementById('status');
                el.innerHTML = '<span class="pulse-dot"></span>Connecté';
                el.className = 'loaded';
            })
            .catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });

        function creerBoite() {
            if (!currentUser) {
                alert('⏳ Attends la connexion...');
                return;
            }
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            database.ref('boites/' + id).set({
                proprietaire: currentUser.uid,
                dateCreation: Date.now(),
                nbMessages: 0
            }).then(() => {
                localStorage.setItem('maBoite', id);
                window.location.href = 'recevoir.html?id=' + id;
            }).catch((error) => {
                alert('❌ Erreur : ' + error.message);
            });
        }

        function voirBoite() {
            const id = localStorage.getItem('maBoite');
            if (id) {
                window.location.href = 'recevoir.html?id=' + id;
            } else {
                alert('❌ Crée d\'abord une boîte !');
            }
        }
    </script>
</body>
</html>
