JOY INFO PURGE 24 PRODUCTION 
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO PURGE 24 - Soumissions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #0a0000 0%, #000000 100%);
            color: #ff0000;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* En-tête */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 36px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #ff0000;
        }

        .citation {
            color: #ff4444;
            font-size: 12px;
            margin-top: 10px;
        }

        /* L'empereur (section principale) */
        .empereur {
            background: rgba(20, 0, 0, 0.7);
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
        }

        .empereur h2 {
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #ff0000;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #ff8888;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }

        .file-input {
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #ff0000;
            border-radius: 8px;
            color: white;
        }

        button {
            background: #ff0000;
            color: black;
            border: none;
            padding: 14px 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #cc0000;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            background: #0a0a0a;
            border-radius: 8px;
            font-size: 12px;
            color: #00ff00;
        }

        /* Forum (messages en bas) */
        .forum {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ff0000;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        .forum h3 {
            color: #ff4444;
            margin-bottom: 15px;
            border-left: 3px solid #ff0000;
            padding-left: 10px;
        }

        .message {
            background: #0a0a0a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 3px solid #ff0000;
        }

        .message-author {
            color: #ff8888;
            font-size: 11px;
            margin-bottom: 5px;
        }

        .message-content {
            color: #cccccc;
            font-size: 13px;
        }

        .message-date {
            color: #660000;
            font-size: 9px;
            text-align: right;
            margin-top: 5px;
        }

        .form-message {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .form-message input {
            flex: 3;
            margin: 0;
        }

        .form-message button {
            flex: 1;
            margin: 0;
        }
    </style>
    <!-- Librairie de compression d'images -->
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚔️ INFO PURGE 24 ⚔️</h1>
            <div class="citation">"Le respect ne se demande pas" - JOYBOY</div>
        </div>

        <!-- SECTION EMPEREUR (soumission avec compression) -->
        <div class="empereur">
            <h2>👑 SOUMETTRE UNE PURGE 👑</h2>
            
            <div class="form-group">
                <label>📝 PSEUDO</label>
                <input type="text" id="pseudo" placeholder="JOYBOY">
            </div>

            <div class="form-group">
                <label>📋 MESSAGE / DESCRIPTION</label>
                <textarea id="message" rows="3" placeholder="Décris la purge..."></textarea>
            </div>

            <div class="form-group">
                <label>📸 CAPTURES D'ÉCRAN (max 4, compression auto)</label>
                <input type="file" id="fichiers" class="file-input" multiple accept="image/*">
            </div>

            <button onclick="soumettrePurge()">🔥 SOUMETTRE LA PURGE 🔥</button>
            <div id="status" class="status">⚡ PRÊT ⚡</div>
        </div>

        <!-- SECTION FORUM (messages en bas) -->
        <div class="forum">
            <h3>📢 FORUM PURGE 24 - DERNIERS MESSAGES</h3>
            <div id="messagesList">
                <div class="message">
                    <div class="message-author">⚔️ JOYBOY ADMIN</div>
                    <div class="message-content">Bienvenue sur le forum PURGE 24. "Le respect ne se demande pas"</div>
                    <div class="message-date">18/04/2026</div>
                </div>
            </div>
            
            <div class="form-message">
                <input type="text" id="messageForum" placeholder="Écris un message...">
                <button onclick="posterMessage()">📢 POSTER</button>
            </div>
        </div>
    </div>

    <script>
        // CHARGER LES MESSAGES SAUVEGARDÉS
        let messages = [];

        function chargerMessages() {
            const saved = localStorage.getItem('forum_messages');
            if(saved) {
                messages = JSON.parse(saved);
                afficherMessages();
            }
        }

        function afficherMessages() {
            const container = document.getElementById('messagesList');
            if(messages.length === 0) {
                container.innerHTML = '<div class="message"><div class="message-author">⚔️ JOYBOY ADMIN</div><div class="message-content">"Le respect ne se demande pas"</div><div class="message-date">18/04/2026</div></div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message">
                    <div class="message-author">⚔️ ${msg.pseudo || "PURGEUR"}</div>
                    <div class="message-content">${msg.contenu}</div>
                    <div class="message-date">${msg.date}</div>
                </div>
            `).join('');
        }

        function posterMessage() {
            const contenu = document.getElementById('messageForum').value.trim();
            if(!contenu) {
                alert("Écris un message !");
                return;
            }
            
            const nouveauMessage = {
                pseudo: "PURGEUR",
                contenu: contenu,
                date: new Date().toLocaleString()
            };
            
            messages.unshift(nouveauMessage);
            if(messages.length > 20) messages.pop();
            localStorage.setItem('forum_messages', JSON.stringify(messages));
            afficherMessages();
            document.getElementById('messageForum').value = '';
        }

        // COMPRESSION D'IMAGES
        async function compressImage(file) {
            const options = {
                maxSizeMB: 0.5,
                maxWidthOrHeight: 1024,
                useWebWorker: true,
                fileType: 'image/jpeg'
            };
            
            try {
                const compressedFile = await imageCompression(file, options);
                return compressedFile;
            } catch (error) {
                console.error("Erreur compression:", error);
                return file;
            }
        }

        // SOUMISSION AVEC COMPRESSION
        async function soumettrePurge() {
            const pseudo = document.getElementById('pseudo').value.trim() || "ANONYME";
            const message = document.getElementById('message').value.trim();
            const fichiers = document.getElementById('fichiers').files;
            
            if(!message) {
                alert("❌ Écris une description !");
                return;
            }
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "📤 Compression des images en cours...";
            statusDiv.style.color = "#ffaa00";
            
            // Compresser les images
            const fichiersCompresses = [];
            for(let i = 0; i < fichiers.length && i < 4; i++) {
                const compressed = await compressImage(fichiers[i]);
                fichiersCompresses.push(compressed);
                statusDiv.innerHTML = `📤 Compression ${i+1}/${Math.min(fichiers.length,4)}...`;
            }
            
            statusDiv.innerHTML = "✅ Images compressées ! Envoi en cours...";
            
            // Simulation d'envoi (remplace par ton vrai backend)
            setTimeout(() => {
                // Ajouter au forum
                const nouveauMessage = {
                    pseudo: pseudo,
                    contenu: `🔴 PURGE: ${message} (${fichiersCompresses.length} image(s))`,
                    date: new Date().toLocaleString()
                };
                messages.unshift(nouveauMessage);
                if(messages.length > 20) messages.pop();
                localStorage.setItem('forum_messages', JSON.stringify(messages));
                afficherMessages();
                
                statusDiv.innerHTML = "✅ SOUMISSION ENVOYÉE ! ✅";
                statusDiv.style.color = "#00ff00";
                
                // Réinitialiser
                document.getElementById('message').value = '';
                document.getElementById('fichiers').value = '';
                
                setTimeout(() => {
                    statusDiv.innerHTML = "⚡ PRÊT ⚡";
                }, 3000);
            }, 2000);
        }

        // INITIALISATION
        chargerMessages();
    </script>
</body>
</html>
