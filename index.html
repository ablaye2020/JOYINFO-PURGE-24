<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Anonyme</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 107, 107, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(238, 90, 36, 0.05) 0%, transparent 70%);
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            width: 100%;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 25px 0;
        }
        .header .logo {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header .logo span {
            background: linear-gradient(135deg, #ff6b6b, #feca57, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .header .menu {
            color: #666;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            padding: 8px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
        }
        .header .menu:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        /* MAIN CARD */
        .main-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 45px 25px 35px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .main-card .big-emoji {
            font-size: 72px;
            display: block;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .main-card h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .main-card h1 span {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-card p {
            color: #888;
            font-size: 15px;
            margin-top: 8px;
            line-height: 1.6;
        }

        /* PSEUDO INPUT */
        .pseudo-box {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 8px 8px 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        .pseudo-box:focus-within {
            border-color: rgba(255, 107, 107, 0.3);
            box-shadow: 0 10px 30px -10px rgba(255, 107, 107, 0.1);
        }
        .pseudo-box .at {
            color: #555;
            font-size: 18px;
            font-weight: 700;
        }
        .pseudo-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 0;
            font-family: inherit;
        }
        .pseudo-box input::placeholder {
            color: #333;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
        }
        .pseudo-box button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 10px 25px -5px rgba(238, 90, 36, 0.3);
        }
        .pseudo-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px -5px rgba(238, 90, 36, 0.4);
        }
        .pseudo-box button:active {
            transform: scale(0.97);
        }

        /* BOUTONS SECONDARY */
        .btn-secondary {
            display: block;
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            color: #999;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* STATS */
        .stats {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .stats .stat {
            flex: 1;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .stats .stat .number {
            color: #fff;
            font-size: 26px;
            font-weight: 800;
        }
        .stats .stat .number span {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats .stat .label {
            color: #555;
            font-size: 11px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #status {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin-top: 18px;
        }
        #status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        .footer {
            text-align: center;
            color: #222;
            font-size: 12px;
            margin-top: 22px;
            letter-spacing: 0.3px;
        }
        .footer span {
            color: #ff6b6b;
        }

        /* Badge "Populaire" */
        .badge-pop {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">Ask<span>Me</span></div>
            <div class="menu">⚡</div>
        </div>

        <!-- MAIN CARD -->
        <div class="main-card">
            <span class="big-emoji">💬</span>
            <h1>Ask<span>Me</span></h1>
            <p>Crée ta boîte anonyme en 2 secondes</p>
            <span class="badge-pop">🔥 Populaire</span>
        </div>

        <!-- PSEUDO -->
        <div class="pseudo-box">
            <span class="at">@</span>
            <input type="text" id="pseudoInput" placeholder="TON PSEUDO" maxlength="20" autocomplete="off">
            <button onclick="creerBoite()">🚀</button>
        </div>

        <button class="btn-secondary" onclick="voirBoite()">📥 Voir mes messages</button>

        <!-- STATS -->
        <div class="stats">
            <div class="stat">
                <div class="number"><span id="statsMessages">0</span></div>
                <div class="label">Messages reçus</div>
            </div>
            <div class="stat">
                <div class="number"><span id="statsPartages">0</span></div>
                <div class="label">Partages</div>
            </div>
        </div>

        <div id="status"><span class="dot"></span>Connexion...</div>
        <div class="footer">🔒 Anonyme et gratuit • <span>♥</span> 2026</div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = null;

        // Récupérer le pseudo sauvegardé
        const savedPseudo = localStorage.getItem('monPseudo');
        if (savedPseudo) {
            document.getElementById('pseudoInput').value = savedPseudo;
            chargerStats(savedPseudo);
        }

        // Connexion anonyme
        firebase.auth().signInAnonymously()
            .then((userCredential) => {
                currentUser = userCredential.user;
                document.getElementById('status').innerHTML = '<span class="dot"></span>Connecté ✅';
            })
            .catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });

        function chargerStats(pseudo) {
            database.ref('boites/' + pseudo + '/nbMessages').once('value').then((snapshot) => {
                const count = snapshot.val() || 0;
                document.getElementById('statsMessages').textContent = count;
            });
        }

        function creerBoite() {
            if (!currentUser) {
                alert('⏳ Attends la connexion...');
                return;
            }

            let pseudo = document.getElementById('pseudoInput').value.trim().toUpperCase();
            if (!pseudo) {
                alert('📝 Choisis un pseudo !');
                return;
            }
            pseudo = pseudo.replace(/[^A-Z0-9]/g, '');
            if (pseudo.length < 3) {
                alert('📝 Minimum 3 caractères');
                return;
            }

            document.getElementById('status').textContent = '⏳ Création...';

            database.ref('pseudos/' + pseudo).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.proprietaire === currentUser.uid) {
                        localStorage.setItem('monPseudo', pseudo);
                        window.location.href = 'https://ablaye2020.github.io/laye-anonymous/recevoir.html?pseudo=' + pseudo;
                    } else {
                        alert('❌ Ce pseudo est déjà pris !');
                        document.getElementById('status').textContent = '❌ Pseudo indisponible';
                    }
                } else {
                    database.ref('boites/' + pseudo).set({
                        proprietaire: currentUser.uid,
                        dateCreation: Date.now(),
                        nbMessages: 0
                    });
                    database.ref('pseudos/' + pseudo).set({
                        proprietaire: currentUser.uid,
                        dateCreation: Date.now()
                    }).then(() => {
                        localStorage.setItem('monPseudo', pseudo);
                        document.getElementById('status').textContent = '✅ Boîte créée !';
                        window.location.href = 'https://ablaye2020.github.io/laye-anonymous/recevoir.html?pseudo=' + pseudo;
                    }).catch((error) => {
                        document.getElementById('status').textContent = '❌ ' + error.message;
                    });
                }
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function voirBoite() {
            const pseudo = localStorage.getItem('monPseudo');
            if (pseudo) {
                window.location.href = 'https://ablaye2020.github.io/laye-anonymous/recevoir.html?pseudo=' + pseudo;
            } else {
                alert('❌ Crée d\'abord une boîte !');
            }
        }
    </script>
</body>
</html>
