<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JOY PURGE GAME</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Montserrat:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/WqK5pNv.jpeg');
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: 0;
        }
        
        .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 80px 20px 70px; }
        
        .marquee {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #000, #8B0000, #000);
            color: #FFD700;
            font-family: 'Cinzel', serif;
            padding: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            border-bottom: 2px solid #FFD700;
            z-index: 100;
        }
        .marquee span { display: inline-block; animation: defile 20s linear infinite; padding-left: 100%; }
        @keyframes defile { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        
        .card {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        h1 { font-family: 'Cinzel', serif; font-size: 2.5em; text-align: center; background: linear-gradient(135deg, #FFD700, #FFA500); -webkit-background-clip: text; background-clip: text; color: transparent; }
        h2 { font-family: 'Cinzel', serif; color: #FFD700; margin-bottom: 20px; }
        
        .btn {
            background: linear-gradient(135deg, #8B0000, #cc0000);
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            color: #FFD700;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }
        .btn-success { background: linear-gradient(135deg, #006400, #008000); }
        
        .nav-buttons { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 25px 0; }
        .nav-btn {
            background: rgba(0,0,0,0.7);
            border: 2px solid #8B0000;
            padding: 12px 30px;
            border-radius: 60px;
            color: #FFD700;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
        }
        .nav-btn.active, .nav-btn:hover { background: linear-gradient(135deg, #8B0000, #cc0000); border-color: #FFD700; }
        
        .section { display: none; animation: fadeIn 0.5s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .form-box { background: rgba(0,0,0,0.5); border-radius: 25px; padding: 25px; margin: 15px 0; border: 1px solid #FFD700; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #FFD700; margin-bottom: 8px; }
        .form-group input { width: 100%; background: #0a0a0a; border: 2px solid #FFD700; padding: 12px; border-radius: 15px; color: white; }
        .photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #FFD700; margin-top: 10px; }
        
        .team-card { background: rgba(0,0,0,0.6); border-left: 5px solid #FFD700; border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .team-name { font-size: 1.3em; font-weight: bold; color: #FFD700; }
        .team-score { font-size: 1.4em; font-weight: bold; color: #FFA500; }
        
        .players-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 30px 0; }
        .player-slot { background: rgba(139,0,0,0.4); border: 2px solid #FFD700; border-radius: 20px; padding: 15px; min-width: 140px; text-align: center; }
        .player-slot.filled { background: rgba(0,100,0,0.5); border-color: #00ff00; }
        .player-slot img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
        
        .quiz-area { background: rgba(0,0,0,0.95); border-radius: 30px; padding: 30px; }
        .question-text { font-size: 1.5em; text-align: center; margin: 25px 0; font-family: 'Cinzel', serif; }
        .answers { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 25px 0; }
        .answer { background: rgba(139,0,0,0.6); border: 2px solid #FFD700; padding: 15px; border-radius: 20px; cursor: pointer; text-align: center; font-size: 1.1em; }
        .answer:hover { background: #8B0000; }
        
        .progress-bar { width: 100%; height: 20px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); width: 0%; transition: width 0.3s; }
        
        .admin-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #8B0000, #cc0000);
            padding: 10px 20px;
            border-radius: 50px;
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
            z-index: 200;
        }
        
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #FFD700;
            border: 2px solid #FFD700;
            z-index: 200;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #FFD700;
            color: #000;
            padding: 10px 20px;
            border-radius: 50px;
            animation: fadeOut 2s ease;
            z-index: 1000;
            font-weight: bold;
        }
        @keyframes fadeOut {
            0% { opacity: 0; bottom: 80px; }
            15% { opacity: 1; bottom: 100px; }
            85% { opacity: 1; }
            100% { opacity: 0; bottom: 120px; }
        }
        
        @media (max-width: 700px) { .answers { grid-template-columns: 1fr; } h1 { font-size: 1.8em; } }
    </style>
</head>
<body>

<div class="marquee"><span>⚜️ JOY PURGE GAME ⚜️ SI UN JOUEUR FAUX = TOUS 0 POINT ⚜️ 4 JOUEURS ⚜️</span></div>

<div class="container">
    <a href="admin.html" class="admin-link">👑 ADMIN</a>
    <div class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</div>
    
    <div class="card" style="text-align: center;">
        <h1>⚜️ JOY PURGE GAME ⚜️</h1>
        <p style="color:#FFD700;">"Un seul faux = 0 point pour toute l'équipe"</p>
    </div>
    
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="showSection('classement')">🏆 CLASSEMENT</button>
        <button class="nav-btn" onclick="showSection('jeu')">⚔️ CRÉER / REJOINDRE</button>
        <button class="nav-btn" onclick="showSection('forum')">💬 FORUM</button>
    </div>
    
    <div id="classement" class="section active">
        <div class="card">
            <h2>🏆 CLASSEMENT DES ÉQUIPES</h2>
            <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 20px;">
                <button class="btn" onclick="loadRanking('partie1')">📝 PARTIE 1</button>
                <button class="btn" onclick="loadRanking('partie2')">🖼️ PARTIE 2</button>
            </div>
            <div id="rankingList">⏳ Chargement...</div>
        </div>
    </div>
    
    <div id="jeu" class="section">
        <div class="card">
            <h2>⚔️ JOY PURGE GAME</h2>
            <div id="createLobby">
                <div class="form-box">
                    <h3 style="text-align:center;">🎮 CRÉER UN SALON</h3>
                    <div class="form-group"><label>🏷️ NOM DU SALON</label><input type="text" id="teamName" placeholder="Ex: CLAN KILLER"></div>
                    <div class="form-group"><label>👤 TON PSEUDO</label><input type="text" id="playerName" placeholder="Ton pseudo"></div>
                    <div class="form-group"><label>📸 TA PHOTO</label><input type="file" id="playerPhoto" accept="image/*"><div id="photoPreview"></div></div>
                    <button class="btn btn-success" onclick="createTeam()" style="width:100%;">🚀 CRÉER LE SALON</button>
                </div>
                <div class="form-box">
                    <h3 style="text-align:center;">🔑 REJOINDRE UN SALON</h3>
                    <div class="form-group"><label>🔢 CODE (4 chiffres)</label><input type="text" id="joinCode" maxlength="4" placeholder="Ex: 1234"></div>
                    <div class="form-group"><label>👤 TON PSEUDO</label><input type="text" id="joinPlayerName" placeholder="Ton pseudo"></div>
                    <div class="form-group"><label>📸 TA PHOTO</label><input type="file" id="joinPlayerPhoto" accept="image/*"><div id="joinPhotoPreview"></div></div>
                    <button class="btn" onclick="joinTeam()" style="width:100%;">🔐 REJOINDRE</button>
                </div>
            </div>
            <div id="gameRoom" style="display: none;"></div>
        </div>
    </div>
    
    <div id="forum" class="section">
        <div class="card">
            <h2>💬 FORUM</h2>
            <input type="text" id="forumPseudo" placeholder="Ton pseudo">
            <textarea id="forumMessage" rows="3" placeholder="Ton message..."></textarea>
            <button class="btn" onclick="postMessage()">📢 PUBLIER</button>
        </div>
        <div class="card"><div id="forumList">⏳ Chargement...</div></div>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="song.mp3.m4a" type="audio/mp4">
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3yYAuiGqbtrbZ1aSYxAjduZ65adNIpag",
        authDomain: "purge-game-58718.firebaseapp.com",
        databaseURL: "https://purge-game-58718-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "purge-game-58718",
        storageBucket: "purge-game-58718.firebasestorage.app",
        messagingSenderId: "554574972856",
        appId: "1:554574972856:web:9de17e7f77eb7b5be4b14d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    
    let currentRoomCode = null;
    let currentPlayerId = localStorage.getItem('playerId') || Math.random().toString(36).substr(2, 8);
    localStorage.setItem('playerId', currentPlayerId);
    let musicPlaying = false;
    let bgMusic = null;
    let currentQuestions = [];
    
    function initMusic() { bgMusic = document.getElementById('bgMusic'); if(bgMusic) bgMusic.volume = 0.2; }
    function toggleMusic() { if(!bgMusic) initMusic(); if(musicPlaying) { bgMusic.pause(); musicPlaying = false; document.getElementById('musicBtn').innerHTML = '🎵'; } else { bgMusic.play().catch(e=>{}); musicPlaying = true; document.getElementById('musicBtn').innerHTML = '🎵🔊'; } }
    document.body.addEventListener('click', () => { if(!musicPlaying && bgMusic) { bgMusic.play().catch(e=>{}); musicPlaying = true; document.getElementById('musicBtn').innerHTML = '🎵🔊'; } }, { once: true });
    
    function toast(msg, isError) { var t = document.createElement('div'); t.className = 'toast'; t.style.background = isError ? '#8B0000' : '#FFD700'; t.style.color = isError ? '#fff' : '#000'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function showSection(section) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(section).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); if(section === 'classement') loadRanking('partie1'); if(section === 'forum') loadForum(); }
    
    async function loadRanking(part) {
        var snap = await db.ref(`teams/${part}`).once('value');
        var teams = [];
        snap.forEach(c => teams.push(c.val()));
        teams.sort((a,b) => (b.score||0) - (a.score||0));
        var container = document.getElementById('rankingList');
        if(teams.length === 0) { container.innerHTML = '<div style="text-align:center;">🏆 Aucune équipe classée</div>'; return; }
        container.innerHTML = teams.map((t,i) => `<div class="team-card"><div><div class="team-name">${i===0?'👑 ':''}⚔️ ${escapeHtml(t.teamName)}</div><div class="team-players" style="font-size:0.8em;color:#aaa;">${t.players?Object.values(t.players).map(p=>`👤 ${escapeHtml(p.name)}`).join(' · '):''}</div></div><div class="team-score">⭐ ${t.score||0} pts</div></div>`).join('');
    }
    
    async function loadForum() {
        var snap = await db.ref('forum').once('value');
        var msgs = [];
        snap.forEach(c => msgs.push(c.val()));
        msgs.reverse();
        var container = document.getElementById('forumList');
        if(msgs.length === 0) { container.innerHTML = '<div style="text-align:center;">💬 Aucun message</div>'; return; }
        container.innerHTML = msgs.map(m => `<div style="background:rgba(0,0,0,0.6);border-radius:15px;padding:15px;margin-bottom:10px;"><div style="color:#FFD700;font-weight:bold;">🔥 ${escapeHtml(m.author)} <span style="font-size:0.7em;color:#aaa;">${m.date||''}</span></div><div style="margin-top:8px;">${escapeHtml(m.message)}</div></div>`).join('');
    }
    async function postMessage() { var a = document.getElementById('forumPseudo').value.trim(); var m = document.getElementById('forumMessage').value.trim(); if(!a||!m) { toast("❌ Pseudo et message requis",true); return; } await db.ref('forum').push({ author:a, message:m, date:new Date().toLocaleString() }); toast("✅ Message publié !"); document.getElementById('forumPseudo').value = ''; document.getElementById('forumMessage').value = ''; loadForum(); }
    
    function previewPhoto(input, div) { var preview = document.getElementById(div); preview.innerHTML = ''; if(input.files && input.files[0]) { var reader = new FileReader(); reader.onload = (e) => { var img = document.createElement('img'); img.src = e.target.result; img.className = 'photo-preview'; preview.appendChild(img); }; reader.readAsDataURL(input.files[0]); } }
    document.getElementById('playerPhoto')?.addEventListener('change', (e) => previewPhoto(e.target, 'photoPreview'));
    document.getElementById('joinPlayerPhoto')?.addEventListener('change', (e) => previewPhoto(e.target, 'joinPhotoPreview'));
    
    async function uploadPhoto(file, path) { if(!file) return null; var ref = storage.ref(`${path}_${Date.now()}_${file.name}`); await ref.put(file); return await ref.getDownloadURL(); }
    
    async function createTeam() { var tn = document.getElementById('teamName').value.trim(); var pn = document.getElementById('playerName').value.trim(); var pf = document.getElementById('playerPhoto').files[0]; if(!tn) { toast("❌ Nom du salon requis",true); return; } if(!pn) { toast("❌ Pseudo requis",true); return; } var code = Math.floor(1000+Math.random()*9000).toString(); var roomRef = db.ref(`game_rooms/${code}`); if((await roomRef.once('value')).exists()) { createTeam(); return; } var pu = pf ? await uploadPhoto(pf, `players/${currentPlayerId}`) : null; await roomRef.set({ teamName:tn, players:{ [currentPlayerId]:{ id:currentPlayerId, name:pn, photo:pu, score:0, answers:[] } }, currentQuestion:0, status:'waiting', scorePart1:0, part:'partie1', createdAt:Date.now() }); toast(`✅ Salon "${tn}" créé ! Code: ${code}`); enterRoom(code); }
    
    async function joinTeam() { var code = document.getElementById('joinCode').value.trim(); var pn = document.getElementById('joinPlayerName').value.trim(); var pf = document.getElementById('joinPlayerPhoto').files[0]; if(!code||code.length!==4) { toast("❌ Code invalide",true); return; } if(!pn) { toast("❌ Pseudo requis",true); return; } var roomRef = db.ref(`game_rooms/${code}`); var room = (await roomRef.once('value')).val(); if(!room) { toast("❌ Salon introuvable",true); return; } if(Object.keys(room.players).length>=4) { toast("❌ Salon complet",true); return; } if(room.status!=='waiting') { toast("❌ Partie déjà commencée",true); return; } var pu = pf ? await uploadPhoto(pf, `players/${currentPlayerId}`) : null; await roomRef.child(`players/${currentPlayerId}`).set({ id:currentPlayerId, name:pn, photo:pu, score:0, answers:[] }); toast(`✅ Rejoint "${room.teamName}"`); enterRoom(code); }
    
    function enterRoom(code) { currentRoomCode = code; document.getElementById('createLobby').style.display = 'none'; document.getElementById('gameRoom').style.display = 'block'; watchRoom(code); }
    
    function watchRoom(code) { var roomRef = db.ref(`game_rooms/${code}`); roomRef.on('value', async (snap) => { var room = snap.val(); if(!room) { toast("❌ Salon fermé",true); leaveRoom(); return; } var players = room.players; var playerCount = Object.keys(players).length; var isHost = players[currentPlayerId] ? true : false; if(room.status === 'waiting') { var html = `<div><h2>🎮 ${escapeHtml(room.teamName)}</h2><div class="players-grid">`; for(var i=1;i<=4;i++) { var p = Object.values(players)[i-1]; html += `<div class="player-slot ${p?'filled':''}">${p ? (p.photo?`<img src="${p.photo}">`:`<div style="font-size:3em;">👤</div>`) : `<div style="font-size:3em;">❓</div>`}<div class="name">${p?escapeHtml(p.name):'En attente...'}</div></div>`; } html += `</div>`; if(isHost && playerCount>=2) { html += `<button class="btn btn-success" onclick="startGame('${code}')">🎮 COMMENCER (${playerCount}/4)</button>`; } else if(isHost) { html += `<p>⏳ En attente... (${playerCount}/4 mini 2)</p>`; } else { html += `<p>⏳ En attente que l'hôte commence...</p>`; } html += `<button class="btn" onclick="leaveRoom()">❌ QUITTER</button></div>`; document.getElementById('gameRoom').innerHTML = html; } else if(room.status === 'playing') { await showQuiz(room, code); } else if(room.status === 'part2_unlocked') { var html2 = `<div class="quiz-area"><h2 style="text-align:center;">🏆 PARTIE 1 TERMINÉE !</h2><div class="score-big" style="font-size:1.5em;color:#FFD700;text-align:center;margin:15px 0;">Score: ${room.scorePart1} points</div>`; if(room.scorePart1 >= 120) { html2 += `<p style="text-align:center;">✅ Score ≥ 120 ! PARTIE 2 DÉBLOQUÉE !</p><div style="text-align:center;"><button class="btn btn-success" onclick="startPart2('${code}')">🖼️ LANCER PARTIE 2</button></div>`; } else { html2 += `<p style="text-align:center;">❌ Score < 120. Partie terminée.</p><div style="text-align:center;"><button class="btn" onclick="leaveRoom()">🏠 QUITTER</button></div>`; } html2 += `</div>`; document.getElementById('gameRoom').innerHTML = html2; } else if(room.status === 'finished') { showFinalResults(room); } }); }
    
    async function startGame(code) { var roomRef = db.ref(`game_rooms/${code}`); await roomRef.update({ status:'playing', currentQuestion:0, currentPart:'partie1' }); await loadQuestions('partie1'); await loadNextQuestion(code,0); }
    async function startPart2(code) { var roomRef = db.ref(`game_rooms/${code}`); await roomRef.update({ status:'playing', currentQuestion:0, currentPart:'partie2' }); await loadQuestions('partie2'); await loadNextQuestion(code,0); }
    async function loadQuestions(part) { var snap = await db.ref(`questions/${part}`).once('value'); currentQuestions = []; snap.forEach(c => currentQuestions.push(c.val())); }
    
    async function loadNextQuestion(code, qIndex) { if(qIndex >= currentQuestions.length) { var roomRef = db.ref(`game_rooms/${code}`); var room = (await roomRef.once('value')).val(); if(room.currentPart === 'partie1') { var total = Object.values(room.players).reduce((s,p)=>s+(p.score||0),0); await roomRef.update({ status:'part2_unlocked', scorePart1:total }); if(total>=120) toast("✅ 120 points ! PARTIE 2 DÉBLOQUÉE !"); else toast(`❌ Score: ${total} points. Partie terminée.`); } else { var totalScore = Object.values(room.players).reduce((s,p)=>s+(p.score||0),0); var sp1 = room.scorePart1||0; await roomRef.update({ status:'finished', scorePart2:totalScore }); var teamData = { teamName:room.teamName, players:room.players, score:sp1+totalScore, scorePart1:sp1, scorePart2:totalScore, date:Date.now() }; await db.ref(`teams/partie1/${code}`).set(teamData); await db.ref(`teams/partie2/${code}`).set(teamData); } return; } var roomRef = db.ref(`game_rooms/${code}`); await roomRef.update({ currentQuestion:qIndex }); await showQuiz((await roomRef.once('value')).val(), code); }
    
    async function showQuiz(room, code) { var q = currentQuestions[room.currentQuestion]; if(!q) return; var totalScore = Object.values(room.players).reduce((s,p)=>s+(p.score||0),0); var progress = (room.currentQuestion / currentQuestions.length)*100; var html = `<div class="quiz-area"><div style="display:flex;justify-content:space-between;"><div>🏆 SCORE: <span style="color:#FFD700;">${totalScore}</span> pts</div><div>📋 Question ${room.currentQuestion+1}/${currentQuestions.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width: ${progress}%;"></div></div>`; if(q.image) html += `<img src="${q.image}" style="max-width:100%;max-height:200px;border-radius:15px;margin:15px auto;display:block;">`; html += `<div class="question-text">${escapeHtml(q.text)}</div><div class="answers">`; q.answers.forEach((ans,i) => { html += `<div class="answer" onclick="submitAnswer('${code}', ${room.currentQuestion}, ${i})">${String.fromCharCode(65+i)}. ${escapeHtml(ans)}</div>`; }); html += `</div></div>`; document.getElementById('gameRoom').innerHTML = html; }
    
    async function submitAnswer(code, qIndex, ansIdx) { var roomRef = db.ref(`game_rooms/${code}`); var room = (await roomRef.once('value')).val(); var q = currentQuestions[qIndex]; var player = room.players[currentPlayerId]; if(player.answers?.includes(qIndex)) { toast("❌ Déjà répondu !",true); return; } await roomRef.child(`players/${currentPlayerId}/answers`).set([...(player.answers||[]), qIndex]); await roomRef.child(`players/${currentPlayerId}/lastAnswer`).set(ansIdx); var allPlayers = Object.values(room.players); var allAnswered = allPlayers.every(p => p.answers?.includes(qIndex)); if(allAnswered) { var allCorrect = allPlayers.every(p => p.lastAnswer === q.correct); if(allCorrect) { for(var pid of Object.keys(room.players)) { var ns = (room.players[pid].score||0)+10; await roomRef.child(`players/${pid}/score`).set(ns); } toast("✅ TOUS JUSTES ! +10 points !"); } else { toast("❌ QUELQU'UN A FAUX ! 0 point !"); } await loadNextQuestion(code, qIndex+1); } else { toast("✅ Réponse enregistrée ! En attente..."); } }
    
    function showFinalResults(room) { var players = Object.values(room.players); players.sort((a,b)=>(b.score||0)-(a.score||0)); var total = players.reduce((s,p)=>s+(p.score||0),0); var html = `<div class="quiz-area"><h2 style="text-align:center;">🏆 RÉSULTATS FINAUX 🏆</h2><div style="font-size:1.5em;color:#FFD700;text-align:center;margin:15px 0;">${escapeHtml(room.teamName)} : ${total} pts</div><div class="players-grid">`; players.forEach(p => { html += `<div class="player-slot filled">${p.photo?`<img src="${p.photo}">`:`<div style="font-size:2em;">👤</div>`}<div class="name">${escapeHtml(p.name)}<br><span style="color:#FFD700;">🎯 ${p.score} pts</span></div></div>`; }); html += `</div><button class="btn" onclick="leaveRoom()">🏠 QUITTER</button></div>`; document.getElementById('gameRoom').innerHTML = html; }
    
    async function leaveRoom() { if(currentRoomCode) { var roomRef = db.ref(`game_rooms/${currentRoomCode}`); await roomRef.child(`players/${currentPlayerId}`).remove(); var snap = await roomRef.once('value'); if(snap.exists() && Object.keys(snap.val().players).length===0) await roomRef.remove(); } currentRoomCode = null; document.getElementById('createLobby').style.display = 'block'; document.getElementById('gameRoom').style.display = 'none'; document.getElementById('joinCode').value = ''; document.getElementById('teamName').value = ''; document.getElementById('playerName').value = ''; document.getElementById('joinPlayerName').value = ''; document.getElementById('playerPhoto').value = ''; document.getElementById('joinPlayerPhoto').value = ''; document.getElementById('photoPreview').innerHTML = ''; document.getElementById('joinPhotoPreview').innerHTML = ''; toast("✅ Salon quitté"); }
    
    initMusic();
    loadRanking('partie1');
    loadForum();
</script>
</body>
