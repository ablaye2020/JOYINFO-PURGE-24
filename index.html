<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Anonyme</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }

        /* === HEADER === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px 0;
        }
        .header .logo {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
        }
        .header .logo span {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .menu {
            color: #666;
            font-size: 14px;
            cursor: pointer;
        }

        /* === CARD PRINCIPALE === */
        .main-card {
            background: #141414;
            border-radius: 24px;
            padding: 40px 24px 30px;
            border: 1px solid #2a2a2a;
            text-align: center;
            margin-bottom: 20px;
        }
        .main-card .big-emoji {
            font-size: 70px;
            display: block;
            margin-bottom: 10px;
        }
        .main-card h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
        }
        .main-card h1 span {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-card p {
            color: #666;
            font-size: 15px;
            margin-top: 6px;
            line-height: 1.6;
        }

        /* === INPUT PSEUDO === */
        .pseudo-box {
            background: #141414;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        .pseudo-box:focus-within {
            border-color: #ff6b6b;
        }
        .pseudo-box .at {
            color: #555;
            font-size: 18px;
            font-weight: 700;
        }
        .pseudo-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 0;
        }
        .pseudo-box input::placeholder {
            color: #333;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
        }
        .pseudo-box button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 10px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }
        .pseudo-box button:hover {
            transform: scale(1.03);
        }

        /* === BOUTONS === */
        .btn-secondary {
            display: block;
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            color: #888;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #222;
            color: #fff;
        }

        /* === STATS === */
        .stats {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .stats .stat {
            flex: 1;
            background: #141414;
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .stats .stat .number {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
        }
        .stats .stat .number span {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats .stat .label {
            color: #444;
            font-size: 11px;
            margin-top: 2px;
        }

        #status {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin-top: 15px;
        }
        .footer {
            text-align: center;
            color: #222;
            font-size: 12px;
            margin-top: 20px;
        }
        .footer span {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Ask<span>Me</span></div>
            <div class="menu">⚙️</div>
        </div>

        <div class="main-card">
            <span class="big-emoji">💬</span>
            <h1>Ask<span>Me</span></h1>
            <p>Crée ta boîte anonyme en 2 secondes</p>
        </div>

        <div class="pseudo-box">
            <span class="at">@</span>
            <input type="text" id="pseudoInput" placeholder="TON PSEUDO" maxlength="20">
            <button onclick="creerBoite()">🚀</button>
        </div>

        <button class="btn-secondary" onclick="voirBoite()">📥 Voir mes messages</button>

        <div class="stats">
            <div class="stat">
                <div class="number"><span id="statsMessages">0</span></div>
                <div class="label">Messages reçus</div>
            </div>
            <div class="stat">
                <div class="number"><span id="statsPartages">0</span></div>
                <div class="label">Partages</div>
            </div>
        </div>

        <div id="status">⏳ Connexion...</div>
        <div class="footer">🔒 Anonyme et gratuit • <span>♥</span> 2026</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = null;

        const savedPseudo = localStorage.getItem('monPseudo');
        if (savedPseudo) {
            document.getElementById('pseudoInput').value = savedPseudo;
            chargerStats(savedPseudo);
        }

        firebase.auth().signInAnonymously()
            .then((userCredential) => {
                currentUser = userCredential.user;
                document.getElementById('status').textContent = '✅ Connecté';
            })
            .catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });

        function chargerStats(pseudo) {
            database.ref('boites/' + pseudo + '/nbMessages').once('value').then((snapshot) => {
                const count = snapshot.val() || 0;
                document.getElementById('statsMessages').textContent = count;
            });
        }

        function creerBoite() {
            if (!currentUser) {
                alert('⏳ Attends la connexion...');
                return;
            }

            let pseudo = document.getElementById('pseudoInput').value.trim().toUpperCase();
            if (!pseudo) {
                alert('📝 Choisis un pseudo !');
                return;
            }
            pseudo = pseudo.replace(/[^A-Z0-9]/g, '');
            if (pseudo.length < 3) {
                alert('📝 Minimum 3 caractères');
                return;
            }

            document.getElementById('status').textContent = '⏳ Création...';

            database.ref('pseudos/' + pseudo).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.proprietaire === currentUser.uid) {
                        localStorage.setItem('monPseudo', pseudo);
                        window.location.href = 'recevoir.html?pseudo=' + pseudo;
                    } else {
                        alert('❌ Ce pseudo est déjà pris !');
                        document.getElementById('status').textContent = '❌ Pseudo indisponible';
                    }
                } else {
                    database.ref('boites/' + pseudo).set({
                        proprietaire: currentUser.uid,
                        dateCreation: Date.now(),
                        nbMessages: 0
                    });
                    database.ref('pseudos/' + pseudo).set({
                        proprietaire: currentUser.uid,
                        dateCreation: Date.now()
                    }).then(() => {
                        localStorage.setItem('monPseudo', pseudo);
                        document.getElementById('status').textContent = '✅ Boîte créée !';
                        window.location.href = 'recevoir.html?pseudo=' + pseudo;
                    }).catch((error) => {
                        document.getElementById('status').textContent = '❌ ' + error.message;
                    });
                }
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function voirBoite() {
            const pseudo = localStorage.getItem('monPseudo');
            if (pseudo) {
                window.location.href = 'recevoir.html?pseudo=' + pseudo;
            } else {
                alert('❌ Crée d\'abord une boîte !');
            }
        }
    </script>
</body>
</html>
