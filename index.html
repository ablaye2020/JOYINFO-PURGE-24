JOY INFO PURGE 24 PRODUCTION 
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>INFO PURGE 24 - Le Journal Officiel des Clans</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #FFD700; margin-bottom: 30px; }
        .clan-card {
            background: #1a1a1a;
            border: 1px solid #8B0000;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .clan-name { font-size: 1.3em; font-weight: bold; color: #FFD700; }
        .clan-points { color: #FFD700; font-weight: bold; }
        .loading { text-align: center; padding: 50px; color: #FFD700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ INFO PURGE 24 ⚔️</h1>
        <div id="clansList" class="loading">⏳ Chargement des clans...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3yYAuiGqbtrbZ1aSYxAjduZ65adNIpag",
            authDomain: "purge-game-58718.firebaseapp.com",
            databaseURL: "https://purge-game-58718-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "purge-game-58718",
            storageBucket: "purge-game-58718.firebasestorage.app",
            messagingSenderId: "554574972856",
            appId: "1:554574972856:web:9de17e7f77eb7b5be4b14d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        async function chargerClans() {
            const container = document.getElementById('clansList');
            container.innerHTML = '<div class="loading">⏳ Chargement...</div>';
            
            try {
                const snapshot = await database.ref('clans').once('value');
                const clans = [];
                snapshot.forEach(child => {
                    clans.push({ id: child.key, ...child.val() });
                });
                
                if(clans.length === 0) {
                    container.innerHTML = '<div class="loading">🏆 Aucun clan. Utilisez l\'admin pour importer.</div>';
                    return;
                }
                
                // Trier par points année
                clans.sort((a,b) => (b.score_year || 0) - (a.score_year || 0));
                
                container.innerHTML = clans.map((clan, index) => `
                    <div class="clan-card">
                        <div>
                            <span style="color:#FFD700; font-size:1.2em;">#${index+1}</span>
                            <span class="clan-name"> ${clan.name}</span>
                            <div style="font-size:0.8em; color:#888;">👑 ${clan.leader}</div>
                        </div>
                        <div class="clan-points">⭐ ${clan.score_year || 0} pts</div>
                    </div>
                `).join('');
                
                console.log("✅ " + clans.length + " clans affichés");
                
            } catch(e) {
                console.error("Erreur:", e);
                container.innerHTML = '<div class="loading">❌ Erreur de chargement: ' + e.message + '</div>';
            }
        }
        
        chargerClans();
    </script>
</body>
</html>
