<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 40px 25px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        .logo {
            font-size: 34px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .logo span {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #999;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .big-emoji {
            font-size: 64px;
            display: block;
            margin-bottom: 15px;
        }
        .input-group {
            background: #f2f2f7;
            border-radius: 30px;
            padding: 4px 4px 4px 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .input-group:focus-within {
            border-color: #ff6b6b;
            background: white;
        }
        .input-group .at {
            color: #bbb;
            font-weight: 700;
            font-size: 18px;
        }
        .input-group input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 0;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
            color: #1a1a1a;
        }
        .input-group input::placeholder {
            color: #ccc;
            text-transform: none;
            font-weight: 400;
            letter-spacing: 0;
        }
        .input-group button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .input-group button:active {
            transform: scale(0.95);
        }
        .btn-secondary {
            display: block;
            width: 100%;
            padding: 16px;
            background: #f2f2f7;
            border: none;
            border-radius: 30px;
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-secondary:active {
            background: #e5e5ea;
        }
        #status {
            color: #bbb;
            font-size: 13px;
            margin-top: 18px;
        }
        .footer {
            color: #ddd;
            font-size: 12px;
            margin-top: 20px;
        }
        .footer span {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Ask<span>Me</span></div>
        <div class="subtitle">Demande-moi tout ce qui est anonyme</div>

        <span class="big-emoji">💬</span>

        <div class="input-group">
            <span class="at">@</span>
            <input type="text" id="pseudoInput" placeholder="TON PSEUDO" maxlength="20">
            <button onclick="creerBoite()">Go</button>
        </div>

        <button class="btn-secondary" onclick="voirBoite()">📥 Voir mes messages</button>

        <div id="status">⚡ Connexion...</div>
        <div class="footer">🔒 Anonyme • <span>♥</span> 2026</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = null;

        const savedPseudo = localStorage.getItem('monPseudo');
        if (savedPseudo) document.getElementById('pseudoInput').value = savedPseudo;

        firebase.auth().signInAnonymously()
            .then((userCredential) => {
                currentUser = userCredential.user;
                document.getElementById('status').textContent = '✅ Connecté';
            })
            .catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });

        function creerBoite() {
            if (!currentUser) { alert('⏳ Attends la connexion...'); return; }
            let pseudo = document.getElementById('pseudoInput').value.trim().toUpperCase();
            if (!pseudo) { alert('📝 Choisis un pseudo !'); return; }
            pseudo = pseudo.replace(/[^A-Z0-9]/g, '');
            if (pseudo.length < 3) { alert('📝 Minimum 3 caractères'); return; }

            document.getElementById('status').textContent = '⏳ Création...';

            database.ref('pseudos/' + pseudo).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.proprietaire === currentUser.uid) {
                        localStorage.setItem('monPseudo', pseudo);
                        window.location.href = 'https://ablaye2020.github.io/laye-anonymous/recevoir.html?pseudo=' + pseudo;
                    } else {
                        alert('❌ Ce pseudo est déjà pris !');
                        document.getElementById('status').textContent = '❌ Pseudo indisponible';
                    }
                } else {
                    database.ref('boites/' + pseudo).set({
                        proprietaire: currentUser.uid,
                        dateCreation: Date.now(),
                        nbMessages: 0
                    });
                    database.ref('pseudos/' + pseudo).set({
                        proprietaire: currentUser.uid,
                        dateCreation: Date.now()
                    }).then(() => {
                        localStorage.setItem('monPseudo', pseudo);
                        document.getElementById('status').textContent = '✅ Boîte créée !';
                        window.location.href = 'https://ablaye2020.github.io/laye-anonymous/recevoir.html?pseudo=' + pseudo;
                    }).catch((error) => {
                        document.getElementById('status').textContent = '❌ ' + error.message;
                    });
                }
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function voirBoite() {
            const pseudo = localStorage.getItem('monPseudo');
            if (pseudo) {
                window.location.href = 'https://ablaye2020.github.io/laye-anonymous/recevoir.html?pseudo=' + pseudo;
            } else {
                alert('❌ Crée d\'abord une boîte !');
            }
        }
    </script>
</body>
</html>
