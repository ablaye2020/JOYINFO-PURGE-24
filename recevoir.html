<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AskMe - Messages</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f2f2f7;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px;
        }

        .header .nav {
            display: flex;
            gap: 24px;
        }

        .header .nav span {
            font-size: 18px;
            font-weight: 700;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
            padding-bottom: 4px;
            border-bottom: 3px solid transparent;
        }

        .header .nav span.active {
            color: #1a1a1a;
            border-bottom-color: #ff6b6b;
        }

        .header .badge {
            background: #ff6b6b;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 30px;
        }

        /* ===== PROFIL ===== */
        .profile-card {
            background: white;
            border-radius: 30px;
            padding: 25px 20px 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .profile-card .pseudo {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a1a;
        }
        .profile-card .pseudo span {
            color: #ff6b6b;
        }
        .profile-card .sub {
            color: #888;
            font-size: 15px;
            margin-top: 4px;
        }
        .profile-card .badge-pop {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 18px;
            border-radius: 30px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== LIEN ===== */
        .link-box {
            background: white;
            border-radius: 30px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .link-box .link {
            flex: 1;
            color: #888;
            font-size: 13px;
            word-break: break-all;
            font-family: monospace;
        }
        .link-box .copy-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .link-box .copy-btn:active {
            transform: scale(0.95);
        }

        /* ===== SHARE ROW ===== */
        .share-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .share-row button {
            flex: 1;
            padding: 14px 10px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .share-row button:active {
            transform: scale(0.95);
        }
        .btn-wa {
            background: #25D366;
            color: white;
        }
        .btn-ig {
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743);
            color: white;
        }
        .btn-copy {
            background: #f2f2f7;
            color: #1a1a1a;
        }

        /* ===== STATS ===== */
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stats .stat {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .stats .stat .number {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
        }
        .stats .stat .number span {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats .stat .label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ===== CONTENU DES ONGLETS ===== */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* ===== PLAY ===== */
        .play-empty {
            background: white;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            color: #aaa;
            font-size: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .play-empty .emoji {
            font-size: 60px;
            display: block;
            margin-bottom: 12px;
        }

        /* ===== MESSAGES INBOX (STYLE IMAGE) ===== */
        .msg-card {
            background: white;
            border-radius: 24px;
            padding: 20px 22px;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            animation: slideIn 0.3s ease;
            border-left: 4px solid #ff6b6b;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-card .msg {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .msg-card .msg .emoji-msg {
            font-size: 22px;
            margin-right: 6px;
        }

        .msg-card .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-card .actions .btn-qui {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            width: 100%;
        }

        .msg-card .actions .btn-qui:active {
            transform: scale(0.97);
        }

        .msg-card .actions .btn-qui .emoji-btn {
            font-size: 18px;
            margin-right: 6px;
        }

        .msg-card .actions .btn-indice {
            background: transparent;
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            width: 100%;
        }

        .msg-card .actions .btn-indice:active {
            transform: scale(0.97);
            background: #fff5f5;
        }

        .msg-card .actions .btn-repondre {
            background: #f2f2f7;
            border: none;
            color: #1a1a1a;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            width: 100%;
        }

        .msg-card .actions .btn-repondre:active {
            transform: scale(0.97);
            background: #e5e5ea;
        }

        .msg-card .meta-indice {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            text-align: center;
            font-style: italic;
        }

        /* ===== EMPTY INBOX ===== */
        .empty-msg {
            background: white;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            color: #aaa;
            font-size: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .empty-msg .emoji {
            font-size: 60px;
            display: block;
            margin-bottom: 12px;
        }

        /* ===== STATUS ===== */
        #status {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin: 10px 0 20px;
        }

        /* ===== BOUTON CHANGER ===== */
        .btn-new {
            width: 100%;
            padding: 16px;
            background: white;
            border: none;
            border-radius: 30px;
            color: #1a1a1a;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .btn-new:active {
            transform: scale(0.98);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            color: #ddd;
            font-size: 12px;
            margin-top: 20px;
        }
        .footer a {
            color: #bbb;
            text-decoration: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 400px) {
            .header .nav span {
                font-size: 16px;
            }
            .msg-card {
                padding: 16px 18px;
            }
            .msg-card .msg {
                font-size: 16px;
            }
            .msg-card .actions .btn-qui {
                font-size: 14px;
                padding: 10px 14px;
            }
            .msg-card .actions .btn-indice,
            .msg-card .actions .btn-repondre {
                font-size: 13px;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== HEADER avec PLAY / INBOX ===== -->
        <div class="header">
            <div class="nav">
                <span class="active" data-tab="play" onclick="switchTab('play')">PLAY</span>
                <span data-tab="inbox" onclick="switchTab('inbox')">INBOX</span>
            </div>
            <div class="badge" id="unreadBadge">0 non lu</div>
        </div>

        <!-- ===== PROFIL ===== -->
        <div class="profile-card">
            <div class="pseudo">@<span id="pseudoDisplay">PSEUDO</span></div>
            <div class="sub">envoie-moi des messages anonymes !</div>
            <span class="badge-pop">❤️ 238 potes sont venus</span>
        </div>

        <!-- ===== LIEN ===== -->
        <div class="link-box">
            <span class="link" id="lienAffichage">Chargement...</span>
            <button class="copy-btn" onclick="copierLien()">Copier</button>
        </div>

        <!-- ===== SHARE ===== -->
        <div class="share-row">
            <button class="btn-wa" onclick="partagerWhatsApp()">💬 WhatsApp</button>
            <button class="btn-ig" onclick="partagerInstagram()">📸 Story</button>
            <button class="btn-copy" onclick="copierLien()">📋 Copier</button>
        </div>

        <!-- ===== STATS ===== -->
        <div class="stats">
            <div class="stat">
                <div class="number"><span id="msgCount">0</span></div>
                <div class="label">Messages reçus</div>
            </div>
            <div class="stat">
                <div class="number"><span id="unreadCount">0</span></div>
                <div class="label">Non lus</div>
            </div>
        </div>

        <div id="status">⏳ Chargement...</div>

        <!-- ===== ONGLET PLAY ===== -->
        <div id="tab-play" class="tab-content active">
            <div class="play-empty">
                <span class="emoji">🎮</span>
                <p>Joue avec tes amis !</p>
                <p style="font-size:13px; margin-top:6px;">Partage ton lien pour recevoir des messages</p>
            </div>
        </div>

        <!-- ===== ONGLET INBOX ===== -->
        <div id="tab-inbox" class="tab-content">
            <div id="messagesContainer">
                <div class="empty-msg">
                    <span class="emoji">🕊️</span>
                    Aucun message reçu
                </div>
            </div>
        </div>

        <button class="btn-new" onclick="creerNouvelleBoite()">🔄 Changer de pseudo</button>
        <div class="footer">🔒 Anonyme • <a href="#">Terms Privacy</a></div>
    </div>

    <script>
        // ===== CONFIGURATION FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ===== RÉCUPÉRATION DU PSEUDO =====
        const params = new URLSearchParams(window.location.search);
        const pseudo = params.get('pseudo');
        let currentUser = null;
        let ancienNombreMessages = 0;
        let messageCount = 0;

        if (pseudo) {
            document.getElementById('pseudoDisplay').textContent = pseudo;
            const lien = 'https://ablaye2020.github.io/laye-anonymous/boite.html?pseudo=' + pseudo;
            document.getElementById('lienAffichage').textContent = lien;
        }

        // ===== FONCTION POUR JOUER LE SON =====
        function jouerSonNotification() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.frequency.value = 880;
                osc1.type = 'sine';
                gain1.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc1.start(audioCtx.currentTime);
                osc1.stop(audioCtx.currentTime + 0.15);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 1100;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.1);
                }, 120);
                setTimeout(() => {
                    const osc3 = audioCtx.createOscillator();
                    const gain3 = audioCtx.createGain();
                    osc3.connect(gain3);
                    gain3.connect(audioCtx.destination);
                    osc3.frequency.value = 660;
                    osc3.type = 'sine';
                    gain3.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain3.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    osc3.start(audioCtx.currentTime);
                    osc3.stop(audioCtx.currentTime + 0.08);
                }, 200);
            } catch (e) {
                console.log('🔇 Son non supporté');
            }
        }

        // ===== AUTHENTIFICATION =====
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                if (pseudo) {
                    verifierProprietaire(pseudo);
                } else {
                    document.getElementById('status').textContent = '❌ Aucun pseudo';
                }
            } else {
                firebase.auth().signInAnonymously();
            }
        });

        // ===== VÉRIFICATION DU PROPRIÉTAIRE =====
        function verifierProprietaire(pseudo) {
            database.ref('boites/' + pseudo).once('value').then((snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById('status').textContent = '❌ Boîte introuvable';
                    return;
                }
                if (data.proprietaire !== currentUser.uid) {
                    document.getElementById('status').textContent = '🔒 Accès refusé';
                    return;
                }
                chargerMessages(pseudo);
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        // ===== CHARGEMENT DES MESSAGES EN TEMPS RÉEL =====
        function chargerMessages(pseudo) {
            const messagesRef = database.ref('boites/' + pseudo + '/messages');
            messagesRef.on('value', (snapshot) => {
                const container = document.getElementById('messagesContainer');
                const data = snapshot.val();
                const countEl = document.getElementById('msgCount');
                const badgeEl = document.getElementById('unreadBadge');

                if (!data) {
                    container.innerHTML = `
                        <div class="empty-msg">
                            <span class="emoji">🕊️</span>
                            Aucun message reçu
                        </div>
                    `;
                    countEl.textContent = '0';
                    document.getElementById('unreadCount').textContent = '0';
                    badgeEl.textContent = '0 non lu';
                    ancienNombreMessages = 0;
                    messageCount = 0;
                    document.getElementById('status').textContent = '✅ Prêt';
                    return;
                }

                const messages = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                })).sort((a, b) => b.date - a.date);

                const nouveauNombre = messages.length;
                messageCount = nouveauNombre;

                if (nouveauNombre > ancienNombreMessages && ancienNombreMessages > 0) {
                    jouerSonNotification();
                    document.getElementById('status').textContent = '🔔 Nouveau message reçu !';
                    setTimeout(() => {
                        document.getElementById('status').textContent = '✅ ' + nouveauNombre + ' message' + (nouveauNombre > 1 ? 's' : '');
                    }, 2000);
                }

                ancienNombreMessages = nouveauNombre;
                countEl.textContent = nouveauNombre;
                document.getElementById('unreadCount').textContent = nouveauNombre;
                badgeEl.textContent = nouveauNombre + ' non lu';

                let html = '';
                const emojis = ['❤️', '😍', '🔥', '👀', '💯', '✨', '🌟', '🎯'];

                messages.forEach((msg, index) => {
                    const emoji = emojis[index % emojis.length];
                    const messageSansEmoji = msg.contenu.replace(/[❤️😍🔥👀💯✨🌟🎯]/g, '').trim();
                    html += `
                        <div class="msg-card">
                            <div class="msg">
                                <span class="emoji-msg">${emoji}</span>
                                ${escapeHtml(messageSansEmoji)}
                            </div>
                            <div class="actions">
                                <button class="btn-qui" onclick="obtenirIndice('${msg.id}')">
                                    <span class="emoji-btn">😍</span> Qui a envoyé ça ?
                                </button>
                                <button class="btn-indice" onclick="obtenirIndice('${msg.id}')">
                                    🔎 Obtenez un indice
                                </button>
                                <button class="btn-repondre" onclick="repondreMessage('${msg.id}')">
                                    ✏️ Répondre
                                </button>
                            </div>
                            <span class="meta-indice">🔎 Cliquez sur "Obtenez un indice" pour découvrir qui a envoyé ce message</span>
                        </div>
                    `;
                });

                container.innerHTML = html;
                document.getElementById('status').textContent = '✅ ' + nouveauNombre + ' message' + (nouveauNombre > 1 ? 's' : '');

                const inboxTab = document.querySelector('[data-tab="inbox"]');
                if (!inboxTab.classList.contains('active')) {
                    badgeEl.style.background = '#ff6b6b';
                    badgeEl.textContent = nouveauNombre + ' non lu 🔴';
                }

            }, (error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        // ===== FONCTIONS UTILITAIRES =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== SWITCH ENTRE LES ONGLETS =====
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.nav span').forEach(el => {
                el.classList.remove('active');
            });

            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');

            const badgeEl = document.getElementById('unreadBadge');
            if (tab === 'inbox') {
                badgeEl.style.background = '#ff6b6b';
                badgeEl.textContent = messageCount + ' non lu';
            } else {
                badgeEl.style.background = '#888';
                badgeEl.textContent = messageCount + ' non lu';
            }
        }

        // ===== ACTIONS SUR LES MESSAGES =====
        function obtenirIndice(messageId) {
            alert('🔎 Indice : La personne qui a envoyé ce message est dans tes contacts !');
        }

        function repondreMessage(messageId) {
            alert('✏️ Tu peux répondre à ce message anonymement !');
        }

        // ===== PARTAGE ET COPIER =====
        function copierLien() {
            const lien = document.getElementById('lienAffichage').textContent;
            navigator.clipboard.writeText(lien).then(() => {
                alert('✅ Lien copié !');
            }).catch(() => {
                prompt('Copie ce lien :', lien);
            });
        }

        function partagerWhatsApp() {
            const lien = document.getElementById('lienAffichage').textContent;
            const msg = encodeURIComponent('👋 Pose-moi une question anonymement ! 🔗 ' + lien);
            window.open('https://wa.me/?text=' + msg, '_blank');
        }

        function partagerInstagram() {
            copierLien();
            alert('📸 Lien copié ! Colle-le dans ta story Instagram 📲');
        }

        function rafraichir() {
            location.reload();
        }

        function supprimerMessages() {
            if (!confirm('⚠️ Supprimer tous les messages ?')) return;
            if (!pseudo) return;
            database.ref('boites/' + pseudo + '/messages').remove()
                .then(() => {
                    database.ref('boites/' + pseudo + '/nbMessages').set(0);
                    alert('✅ Messages supprimés');
                })
                .catch((error) => alert('❌ ' + error.message));
        }

        function creerNouvelleBoite() {
            localStorage.removeItem('monPseudo');
            window.location.href = 'https://ablaye2020.github.io/laye-anonymous/';
        }
    </script>
</body>
</html>
