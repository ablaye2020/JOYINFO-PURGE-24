<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Messages</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 420px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px 0;
        }
        .header .logo {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
        }
        .header .logo span {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .header-actions button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #666;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .header-actions button:hover {
            background: #222;
            color: #fff;
        }

        .profile-card {
            background: #141414;
            border-radius: 20px;
            padding: 25px 20px;
            border: 1px solid #2a2a2a;
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-card .avatar {
            font-size: 50px;
            display: block;
            margin-bottom: 5px;
        }
        .profile-card .pseudo {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .profile-card .pseudo span {
            color: #ff6b6b;
        }
        .profile-card .sub {
            color: #555;
            font-size: 14px;
        }

        .link-box {
            background: #141414;
            border-radius: 16px;
            padding: 16px 18px;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .link-box .link {
            flex: 1;
            color: #aaa;
            font-size: 13px;
            word-break: break-all;
        }
        .link-box .copy-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .link-box .copy-btn:hover {
            transform: scale(1.05);
        }

        .share-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .share-row button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .share-row button:hover { transform: translateY(-2px); }
        .btn-wa { background: #25D366; color: white; }
        .btn-ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743); color: white; }
        .btn-copy { background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stats .stat {
            flex: 1;
            background: #141414;
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .stats .stat .number {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
        }
        .stats .stat .number span {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats .stat .label {
            color: #444;
            font-size: 11px;
            margin-top: 2px;
        }

        .msg-card {
            background: #141414;
            border-radius: 14px;
            padding: 16px 18px;
            border: 1px solid #2a2a2a;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }
        .msg-card .msg {
            color: #eee;
            font-size: 15px;
            line-height: 1.5;
        }
        .msg-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .msg-card .date {
            color: #444;
            font-size: 11px;
        }
        .msg-card .badge {
            color: #ff6b6b;
            font-size: 11px;
            font-weight: 600;
        }
        .empty-msg {
            color: #333;
            text-align: center;
            padding: 30px;
            font-size: 14px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #status {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin: 10px 0;
        }
        .btn-new {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            color: #666;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-new:hover {
            background: #222;
            color: #fff;
        }
        .footer {
            text-align: center;
            color: #222;
            font-size: 12px;
            margin-top: 20px;
        }
        .footer a {
            color: #555;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Ask<span>Me</span></div>
            <div class="header-actions">
                <button onclick="rafraichir()">🔄</button>
                <button onclick="supprimerMessages()">🗑️</button>
            </div>
        </div>

        <div class="profile-card">
            <span class="avatar">👤</span>
            <div class="pseudo">@<span id="pseudoDisplay">PSEUDO</span></div>
            <div class="sub">envoie-moi des messages anonymes !</div>
        </div>

        <div class="link-box">
            <span class="link" id="lienAffichage">Chargement...</span>
            <button class="copy-btn" onclick="copierLien()">Copier</button>
        </div>

        <div class="share-row">
            <button class="btn-wa" onclick="partagerWhatsApp()">💬 WhatsApp</button>
            <button class="btn-ig" onclick="partagerInstagram()">📸 Story</button>
            <button class="btn-copy" onclick="copierLien()">📋 Copier</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="number"><span id="msgCount">0</span></div>
                <div class="label">Messages reçus</div>
            </div>
            <div class="stat">
                <div class="number"><span id="unreadCount">0</span></div>
                <div class="label">Non lus</div>
            </div>
        </div>

        <div id="status">⏳ Chargement...</div>

        <div id="messagesContainer">
            <div class="empty-msg">🕊️ Aucun message reçu</div>
        </div>

        <button class="btn-new" onclick="creerNouvelleBoite()">🔄 Changer de pseudo</button>
        <div class="footer">🔒 Anonyme • <a href="#">Terms Privacy</a></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const pseudo = params.get('pseudo');
        let currentUser = null;
        let ancienNombreMessages = 0;

        // ✅ LIEN CORRIGÉ AVEC LE BON CHEMIN
        if (pseudo) {
            document.getElementById('pseudoDisplay').textContent = pseudo;
            const lien = window.location.origin + '/laye-anonymous/boite.html?pseudo=' + pseudo;
            document.getElementById('lienAffichage').textContent = lien;
        }

        function jouerSonNotification() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.frequency.value = 880;
                osc1.type = 'sine';
                gain1.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc1.start(audioCtx.currentTime);
                osc1.stop(audioCtx.currentTime + 0.15);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 1100;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.1);
                }, 100);
            } catch (e) {}
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                if (pseudo) {
                    verifierProprietaire(pseudo);
                } else {
                    document.getElementById('status').textContent = '❌ Aucun pseudo';
                }
            } else {
                firebase.auth().signInAnonymously();
            }
        });

        function verifierProprietaire(pseudo) {
            database.ref('boites/' + pseudo).once('value').then((snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById('status').textContent = '❌ Boîte introuvable';
                    return;
                }
                if (data.proprietaire !== currentUser.uid) {
                    document.getElementById('status').textContent = '🔒 Accès refusé';
                    return;
                }
                chargerMessages(pseudo);
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function chargerMessages(pseudo) {
            const messagesRef = database.ref('boites/' + pseudo + '/messages');
            messagesRef.on('value', (snapshot) => {
                const container = document.getElementById('messagesContainer');
                const data = snapshot.val();
                const countEl = document.getElementById('msgCount');

                if (!data) {
                    container.innerHTML = '<div class="empty-msg">🕊️ Aucun message reçu</div>';
                    countEl.textContent = '0';
                    document.getElementById('unreadCount').textContent = '0';
                    ancienNombreMessages = 0;
                    document.getElementById('status').textContent = '✅ Prêt';
                    return;
                }

                const messages = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                })).sort((a, b) => b.date - a.date);

                const nouveauNombre = messages.length;
                if (nouveauNombre > ancienNombreMessages && ancienNombreMessages > 0) {
                    jouerSonNotification();
                    document.getElementById('status').textContent = '🔔 Nouveau message !';
                    setTimeout(() => {
                        document.getElementById('status').textContent = '✅ ' + nouveauNombre + ' message(s)';
                    }, 2000);
                }
                ancienNombreMessages = nouveauNombre;
                countEl.textContent = nouveauNombre;
                document.getElementById('unreadCount').textContent = nouveauNombre;

                let html = '';
                const emojis = ['❤️', '😍', '🔥', '👀', '💯', '✨'];
                messages.forEach((msg, index) => {
                    const date = msg.date ? new Date(msg.date).toLocaleString('fr-FR') : 'Date inconnue';
                    const emoji = emojis[index % emojis.length];
                    html += `
                        <div class="msg-card">
                            <div class="msg">${escapeHtml(msg.contenu)}</div>
                            <div class="meta">
                                <span class="date">📅 ${date}</span>
                                <span class="badge">${emoji} Anonyme</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                document.getElementById('status').textContent = '✅ ' + nouveauNombre + ' message' + (nouveauNombre > 1 ? 's' : '');
            }, (error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copierLien() {
            const lien = document.getElementById('lienAffichage').textContent;
            navigator.clipboard.writeText(lien).then(() => {
                alert('✅ Lien copié !');
            }).catch(() => {
                prompt('Copie ce lien :', lien);
            });
        }

        function partagerWhatsApp() {
            const lien = document.getElementById('lienAffichage').textContent;
            const msg = encodeURIComponent('👋 Pose-moi une question anonymement ! 🔗 ' + lien);
            window.open('https://wa.me/?text=' + msg, '_blank');
        }

        function partagerInstagram() {
            copierLien();
            alert('📸 Lien copié ! Colle-le dans ta story Instagram 📲');
        }

        function rafraichir() { location.reload(); }

        function supprimerMessages() {
            if (!confirm('⚠️ Supprimer tous les messages ?')) return;
            if (!pseudo) return;
            database.ref('boites/' + pseudo + '/messages').remove()
                .then(() => {
                    database.ref('boites/' + pseudo + '/nbMessages').set(0);
                    alert('✅ Messages supprimés');
                })
                .catch((error) => alert('❌ ' + error.message));
        }

        function creerNouvelleBoite() {
            localStorage.removeItem('monPseudo');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
