<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe - Messages</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 420px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px 0;
        }
        .header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
        }
        .header h1 span {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .header-actions button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #666;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .header-actions button:hover {
            background: #222;
            color: #fff;
        }

        /* === STYLE AQA PUR === */
        .aqa-box {
            background: #141414;
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid #2a2a2a;
            text-align: center;
            margin-bottom: 25px;
        }
        .aqa-box .emoji-big {
            font-size: 60px;
            display: block;
            margin-bottom: 10px;
        }
        .aqa-box h2 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
        }
        .aqa-box p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .step {
            background: #141414;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2a2a;
            margin-bottom: 15px;
        }
        .step .step-label {
            color: #ff6b6b;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .step .step-text {
            color: #ccc;
            font-size: 15px;
            margin-top: 4px;
        }
        .step .link-display {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 14px 16px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
        }
        .step .link-display .link {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            word-break: break-all;
        }
        .step .link-display .copy-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }
        .step .link-display .copy-btn:hover {
            transform: scale(1.05);
        }

        .btn-share {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-share:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(238, 90, 36, 0.25);
        }

        .btn-new {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            color: #666;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-new:hover {
            background: #1a1a1a;
            color: #fff;
        }

        /* Messages reçus (petit affichage en bas) */
        .messages-section {
            margin-top: 25px;
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
        }
        .messages-section .title {
            color: #444;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .msg-card {
            background: #141414;
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid #2a2a2a;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
        }
        .msg-card .msg {
            color: #eee;
            font-size: 15px;
            line-height: 1.5;
        }
        .msg-card .date {
            color: #444;
            font-size: 11px;
            margin-top: 6px;
            display: block;
        }
        .empty-msg {
            color: #333;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #status {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin: 10px 0;
        }
        .footer {
            text-align: center;
            color: #222;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Ask<span>Me</span></h1>
            <div class="header-actions">
                <button onclick="rafraichir()">🔄</button>
                <button onclick="supprimerMessages()">🗑️</button>
            </div>
        </div>

        <!-- ÉTAPE 1 -->
        <div class="step">
            <div class="step-label">📌 Étape 1</div>
            <div class="step-text">Copie ton lien</div>
            <div class="link-display">
                <span class="link" id="lienAffichage">Chargement...</span>
                <button class="copy-btn" onclick="copierLien()">Copier</button>
            </div>
        </div>

        <!-- ÉTAPE 2 -->
        <div class="step">
            <div class="step-label">📌 Étape 2</div>
            <div class="step-text">Partage le lien sur ta Story Instagram</div>
            <button class="btn-share" onclick="partagerInstagram()">
                📸 Partager sur Instagram
            </button>
            <button class="btn-share" style="background:#25D366; margin-top:10px;" onclick="partagerWhatsApp()">
                💬 Partager sur WhatsApp
            </button>
        </div>

        <div id="status">⏳ Chargement...</div>

        <!-- Messages reçus -->
        <div class="messages-section">
            <div class="title">📬 Messages reçus (<span id="msgCount">0</span>)</div>
            <div id="messagesContainer">
                <div class="empty-msg">Aucun message reçu pour l'instant</div>
            </div>
        </div>

        <button class="btn-new" onclick="creerNouvelleBoite()">🔄 Changer de pseudo</button>
        <div class="footer">🔒 100% anonyme</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmrwHuZhxJRSOAIEB04Bc2xfMiCdIzMIc",
            authDomain: "mon-jeu-anonymous.firebaseapp.com",
            databaseURL: "https://mon-jeu-anonymous-default-rtdb.firebaseio.com",
            projectId: "mon-jeu-anonymous",
            storageBucket: "mon-jeu-anonymous.firebasestorage.app",
            messagingSenderId: "24673956799",
            appId: "1:24673956799:web:b690ad1d9b84606a75e70a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const pseudo = params.get('pseudo');
        let currentUser = null;
        let ancienNombreMessages = 0;

        if (pseudo) {
            const lien = window.location.origin + '/boite.html?pseudo=' + pseudo;
            document.getElementById('lienAffichage').textContent = lien;
        }

        // 🔔 SON
        function jouerSonNotification() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.frequency.value = 880;
                osc1.type = 'sine';
                gain1.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc1.start(audioCtx.currentTime);
                osc1.stop(audioCtx.currentTime + 0.15);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 1100;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.1);
                }, 100);
            } catch (e) {}
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                if (pseudo) {
                    verifierProprietaire(pseudo);
                } else {
                    document.getElementById('status').textContent = '❌ Aucun pseudo';
                }
            } else {
                firebase.auth().signInAnonymously();
            }
        });

        function verifierProprietaire(pseudo) {
            database.ref('boites/' + pseudo).once('value').then((snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById('status').textContent = '❌ Boîte introuvable';
                    return;
                }
                if (data.proprietaire !== currentUser.uid) {
                    document.getElementById('status').textContent = '🔒 Accès refusé';
                    return;
                }
                chargerMessages(pseudo);
            }).catch((error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function chargerMessages(pseudo) {
            const messagesRef = database.ref('boites/' + pseudo + '/messages');
            messagesRef.on('value', (snapshot) => {
                const container = document.getElementById('messagesContainer');
                const data = snapshot.val();
                const countEl = document.getElementById('msgCount');

                if (!data) {
                    container.innerHTML = '<div class="empty-msg">🕊️ Aucun message reçu</div>';
                    countEl.textContent = '0';
                    ancienNombreMessages = 0;
                    document.getElementById('status').textContent = '✅ Prêt';
                    return;
                }

                const messages = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                })).sort((a, b) => b.date - a.date);

                const nouveauNombre = messages.length;
                if (nouveauNombre > ancienNombreMessages && ancienNombreMessages > 0) {
                    jouerSonNotification();
                    document.getElementById('status').textContent = '🔔 Nouveau message !';
                    setTimeout(() => {
                        document.getElementById('status').textContent = '✅ ' + nouveauNombre + ' message(s)';
                    }, 2000);
                }
                ancienNombreMessages = nouveauNombre;
                countEl.textContent = nouveauNombre;

                let html = '';
                messages.forEach((msg) => {
                    const date = msg.date ? new Date(msg.date).toLocaleString('fr-FR') : 'Date inconnue';
                    html += `
                        <div class="msg-card">
                            <div class="msg">${escapeHtml(msg.contenu)}</div>
                            <span class="date">📅 ${date}</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
                document.getElementById('status').textContent = '✅ ' + nouveauNombre + ' message' + (nouveauNombre > 1 ? 's' : '');
            }, (error) => {
                document.getElementById('status').textContent = '❌ ' + error.message;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copierLien() {
            const lien = document.getElementById('lienAffichage').textContent;
            navigator.clipboard.writeText(lien).then(() => {
                alert('✅ Lien copié !');
            }).catch(() => {
                prompt('Copie ce lien :', lien);
            });
        }

        function partagerInstagram() {
            copierLien();
            alert('📸 Lien copié ! Colle-le dans ta story Instagram 📲');
        }

        function partagerWhatsApp() {
            const lien = document.getElementById('lienAffichage').textContent;
            const msg = encodeURIComponent('👋 Pose-moi une question anonymement ! 🔗 ' + lien);
            window.open('https://wa.me/?text=' + msg, '_blank');
        }

        function rafraichir() { location.reload(); }

        function supprimerMessages() {
            if (!confirm('⚠️ Supprimer tous les messages ?')) return;
            if (!pseudo) return;
            database.ref('boites/' + pseudo + '/messages').remove()
                .then(() => {
                    database.ref('boites/' + pseudo + '/nbMessages').set(0);
                    alert('✅ Messages supprimés');
                })
                .catch((error) => alert('❌ ' + error.message));
        }

        function creerNouvelleBoite() {
            localStorage.removeItem('monPseudo');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
